  publisher_name: "Provincia Autonoma di Trento"
  publisher_identifier: "pat"           # Codice IPA dell'ente
  language: "ITA"                       # Codice ISO 639-3
  homepage: "https://dati.trentino.it"

output:
  path: "output/catalog.ttl"
